0\" cy=\"72\" r=\"36\" stroke=\"#FFC400\" stroke-width=\"1.5\" fill=\"rgba(255,196,0,0.07)\"><\u002Fcircle><g transform=\"translate(422,54) scale(1.5)\" stroke=\"#FFC400\" stroke-width=\"1.33\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10a1 1 0 0 1-.4.8A6 6 0 0 1 16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528\"><\u002Fpath><\u002Fg><text x=\"440\" y=\"121\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:10px;letter-spacing:.07em\">ADVANCE<\u002Ftext><text x=\"280\" y=\"163\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">W-01 · THE WILDLAND PROGRESSION LOOP<\u002Ftext><\u002Fsvg><p>The feature connects three nested loops - each building on the previous to create meaning across different timescales.<\u002Fp><div class=\"diagram\" style=\"margin-top:18px\"><div class=\"loopCard\"><div class=\"loopLabel\">ACTION LOOP<\u002Fdiv><div class=\"loopNodes\"><div class=\"dnode\"><div class=\"dnum\">01<\u002Fdiv><div class=\"dnt\">Spend Potions<\u002Fdiv><div class=\"dns\">Entry currency spent on obstacles.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">02<\u002Fdiv><div class=\"dnt\">Clear Obstacles<\u002Fdiv><div class=\"dns\">Each cleared obstacle drops a Flag.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">03<\u002Fdiv><div class=\"dnt\">Earn Flags<\u002Fdiv><div class=\"dns\">Flags are the currency of Stage progression.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"dcap\" style=\"margin-top:10px\">Moment-to-moment action - every spend has a visible result.<\u002Fdiv><\u002Fdiv><div class=\"loopCard\"><div class=\"loopLabel\">STAGE LOOP<\u002Fdiv><div class=\"loopNodes\"><div class=\"dnode\"><div class=\"dnum\">01<\u002Fdiv><div class=\"dnt\">Earn Flags<\u002Fdiv><div class=\"dns\">Flags fill the progress bar.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">02<\u002Fdiv><div class=\"dnt\">Fill Stage Bar<\u002Fdiv><div class=\"dns\">Progress is visible and measurable.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">03<\u002Fdiv><div class=\"dnt\">Receive Rewards<\u002Fdiv><div class=\"dns\">Spins, gems, and event currency.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">04<\u002Fdiv><div class=\"dnt\">Advance<\u002Fdiv><div class=\"dns\">Unlock the next Stage on the map.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"dcap\" style=\"margin-top:10px\">Stage progression - gives meaning to each individual action.<\u002Fdiv><\u002Fdiv><div class=\"loopCard\"><div class=\"loopLabel\">CHAPTER LOOP<\u002Fdiv><div class=\"loopNodes\"><div class=\"dnode\"><div class=\"dnum\">01<\u002Fdiv><div class=\"dnt\">Complete Stages<\u002Fdiv><div class=\"dns\">Several Stages fill the Chapter.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">02<\u002Fdiv><div class=\"dnt\">Finish Chapter<\u002Fdiv><div class=\"dns\">Chapter completion - rewards and recognition.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">03<\u002Fdiv><div class=\"dnt\">Unlock Next Chapter<\u002Fdiv><div class=\"dns\">New environment, obstacles, reward cadence.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"dcap\" style=\"margin-top:10px\">Long-term arc - creates a sense of journey beyond individual sessions.<\u002Fdiv><\u002Fdiv><div class=\"dsub\"><span class=\"chip\">Tree of Life · water<\u002Fspan><span class=\"chip\">Wildland Temple · bombs<\u002Fspan><span class=\"chip\">Race · points → levels<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">PROGRESSION &amp;<br>ECONOMY<br>ITERATION<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><svg viewBox=\"0 0 560 228\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:auto;display:block;margin-bottom:22px\"><rect x=\"20\" y=\"180\" width=\"80\" height=\"25\" rx=\"3\" style=\"fill:var(--dim);fill-opacity:.15;stroke:var(--dim)\" stroke-width=\"1\"><\u002Frect><g transform=\"translate(48,148)\" style=\"stroke:var(--dim)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z\"><\u002Fpath><path d=\"m3.3 7 8.7 5 8.7-5\"><\u002Fpath><path d=\"M12 22V12\"><\u002Fpath><\u002Fg><text x=\"60\" y=\"217\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">OBJECT<\u002Ftext><rect x=\"120\" y=\"150\" width=\"80\" height=\"55\" rx=\"3\" style=\"fill:var(--dim);fill-opacity:.18;stroke:var(--dim)\" stroke-width=\"1\"><\u002Frect><g transform=\"translate(148,118)\" style=\"stroke:var(--dim)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M5 21v-6\"><\u002Fpath><path d=\"M12 21V9\"><\u002Fpath><path d=\"M19 21V3\"><\u002Fpath><\u002Fg><text x=\"160\" y=\"217\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">PROGRESS BAR<\u002Ftext><rect x=\"220\" y=\"120\" width=\"80\" height=\"85\" rx=\"3\" style=\"fill:var(--fg);fill-opacity:.07;stroke:var(--fg);stroke-opacity:.35\" stroke-width=\"1\"><\u002Frect><g transform=\"translate(248,88)\" style=\"stroke:var(--fg)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><circle cx=\"6\" cy=\"19\" r=\"3\"><\u002Fcircle><path d=\"M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15\"><\u002Fpath><circle cx=\"18\" cy=\"5\" r=\"3\"><\u002Fcircle><\u002Fg><text x=\"260\" y=\"217\" text-anchor=\"middle\" style=\"fill:var(--fg);fill-opacity:.65;font-family:var(--font);font-size:9px;letter-spacing:.06em\">ROAD<\u002Ftext><rect x=\"320\" y=\"90\" width=\"80\" height=\"115\" rx=\"3\" fill=\"rgba(255,196,0,0.1)\" stroke=\"#FFC400\" stroke-width=\"1\"><\u002Frect><g transform=\"translate(348,58)\" stroke=\"#FFC400\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M4 22V4a1 1 0 0 1 .4-.8A6 6 0 0 1 8 2c3 0 5 2 7.333 2q2 0 3.067-.8A1 1 0 0 1 20 4v10a1 1 0 0 1-.4.8A6 6 0 0 1 16 16c-3 0-5-2-8-2a6 6 0 0 0-4 1.528\"><\u002Fpath><\u002Fg><text x=\"360\" y=\"217\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:9px;letter-spacing:.06em\">STAGE<\u002Ftext><rect x=\"420\" y=\"55\" width=\"80\" height=\"150\" rx=\"3\" fill=\"rgba(255,196,0,0.13)\" stroke=\"#FFC400\" stroke-width=\"1.5\"><\u002Frect><g transform=\"translate(448,23)\" stroke=\"#FFC400\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M12 21V7\"><\u002Fpath><path d=\"m16 12 2 2 4-4\"><\u002Fpath><path d=\"M22 6V4a1 1 0 0 0-1-1h-5a4 4 0 0 0-4 4 4 4 0 0 0-4-4H3a1 1 0 0 0-1 1v13a1 1 0 0 0 1 1h6a3 3 0 0 1 3 3 3 3 0 0 1 3-3h6a1 1 0 0 0 1-1v-1.3\"><\u002Fpath><\u002Fg><text x=\"460\" y=\"217\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:9px;letter-spacing:.06em\">CHAPTER<\u002Ftext><text x=\"280\" y=\"228\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">W-02 · NESTED PROGRESSION MODEL<\u002Ftext><\u002Fsvg><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>The goal was not to remove complexity, but to distribute it more intentionally across the Stage. An uneven progression curve created a mid-Stage bottleneck that carried into end-Stage exhaustion.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>המטרה לא הייתה להסיר מורכבות, אלא לפזר אותה בצורה מכוונת יותר לאורך ה-Stage. עקומת Progression לא אחידה יצרה Bottleneck באמצע ה-Stage שהוביל לעייפות לקראת הסיום.<\u002Fp><\u002Fsc-if><div class=\"cmp\" style=\"margin-top:14px\"><div class=\"cmpCol\"><div class=\"cmpH\">BEFORE<\u002Fdiv><div class=\"baChain\"><div class=\"dnode\" style=\"font-size:13px;padding:8px 12px\">Stable start<\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\" style=\"font-size:13px;padding:8px 12px;border-color:rgba(255,80,80,.3);background:rgba(255,80,80,.06)\">Dense mid-Stage<\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\" style=\"font-size:13px;padding:8px 12px;border-color:rgba(255,80,80,.3);background:rgba(255,80,80,.06)\">Sustained friction<\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\" style=\"font-size:13px;padding:8px 12px;border-color:rgba(255,80,80,.3);background:rgba(255,80,80,.06)\">Exhausted finish<\u002Fdiv><\u002Fdiv><div style=\"font-family:var(--font);font-size:12px;color:var(--dim);margin-top:12px\">2S / 6M / 8L / 4 Rewards - high cost density, long uninterrupted segments.<\u002Fdiv><\u002Fdiv><div class=\"cmpCol\"><div class=\"cmpH\">AFTER<\u002Fdiv><div class=\"baChain\"><div class=\"dnode\" style=\"font-size:13px;padding:8px 12px\">Stable start<\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\" style=\"font-size:13px;padding:8px 12px;border-color:rgba(143,224,74,.3);background:rgba(143,224,74,.06)\">Gradual complexity<\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\" style=\"font-size:13px;padding:8px 12px;border-color:var(--acc);background:rgba(233,162,59,.08)\">Pacing break<\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\" style=\"font-size:13px;padding:8px 12px;border-color:rgba(143,224,74,.3);background:rgba(143,224,74,.06)\">Denser challenge<\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\" style=\"font-size:13px;padding:8px 12px\">Controlled finish<\u002Fdiv><\u002Fdiv><div style=\"font-family:var(--font);font-size:12px;color:var(--dim);margin-top:12px\">2S / 7M / 7L / 5 Rewards - redistributed cost, clearer beats, added relief point.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"margin-top:24px\"><div class=\"cmpH\" style=\"margin-bottom:8px\">GAMEPLAY BEATS - AFTER<\u002Fdiv><table class=\"beatTbl\"><tbody><tr><td>Opening Beat<\u002Ftd><td>S · S · M<\u002Ftd><td>Reward → low friction entry<\u002Ftd><\u002Ftr><tr><td>Rising Action<\u002Ftd><td>M · M · L<\u002Ftd><td>Reward → gradual escalation<\u002Ftd><\u002Ftr><tr><td>Relief Beat<\u002Ftd><td>M · L<\u002Ftd><td>Reward → deliberate pacing break before peak<\u002Ftd><\u002Ftr><tr><td>Escalation<\u002Ftd><td>M · L · M · L · L<\u002Ftd><td>Reward → highest density<\u002Ftd><\u002Ftr><tr><td>Climactic Finish<\u002Ftd><td>M · L · L<\u002Ftd><td>Reward → Stage Complete<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><\u002Fdiv><div class=\"note\" style=\"margin-top:20px\">// Conceptual reconstruction showing relative obstacle cost (S Small / M Medium / L Large). Exact Economy values are confidential. Subsequent tests showed improved pacing and completion, though causality cannot be isolated.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">SCREENS<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><div class=\"shots\" style=\"grid-template-columns:1fr 1fr 1fr\"><div class=\"shot\" style=\"overflow:hidden;border-radius:7px\"><img src=\"8442f636-45e2-405a-be4b-aed5ee9bda35\" alt=\"Wildland stage - green biome\" style=\"width:100%;height:100%;object-fit:cover;object-position:center top;display:block\"><\u002Fdiv><div class=\"shot\" style=\"overflow:hidden;border-radius:7px\"><img src=\"9d0f41e2-9897-442f-bedc-bbf5f87bab8a\" alt=\"Wildland stage - canyon biome\" style=\"width:100%;height:100%;object-fit:cover;object-position:center top;display:block\"><\u002Fdiv><div class=\"shot\" style=\"overflow:hidden;border-radius:7px\"><img src=\"9436f1dd-1871-4f82-95a4-2b204e8b0954\" alt=\"Wildland stage - desert biome\" style=\"width:100%;height:100%;object-fit:cover;object-position:center top;display:block\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">WALKTHROUGH<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><div class=\"video\"><iframe src=\"https://www.youtube-nocookie.com/embed/VKFxdaxH3AI\" title=\"Wildland Adventure walkthrough\" allow=\"encrypted-media; picture-in-picture; fullscreen\" loading=\"lazy\"><\u002Fiframe><\u002Fdiv><div class=\"note\">// Reference capture of the live feature. Swap for your own walkthrough or screen recording.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">ROLE &amp;<br>PRODUCTION<br>FLOW<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><svg viewBox=\"0 0 560 220\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:auto;display:block;margin-bottom:4px\"><defs><marker id=\"w10a\" markerWidth=\"7\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 7 3, 0 6\" style=\"fill:var(--dim)\"><\u002Fpolygon><\u002Fmarker><\u002Fdefs><!-- Lane labels --><text x=\"12\" y=\"38\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.07em\">PRODUCT · ECONOMY<\u002Ftext><text x=\"12\" y=\"118\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.07em\">LEON<\u002Ftext><text x=\"12\" y=\"198\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.07em\">ART · DEV · QA<\u002Ftext><!-- Lane dividers --><line x1=\"0\" y1=\"50\" x2=\"560\" y2=\"50\" style=\"stroke:var(--line)\" stroke-width=\"1\"><\u002Fline><line x1=\"0\" y1=\"130\" x2=\"560\" y2=\"130\" stroke-dasharray=\"3,3\" style=\"stroke:var(--dim);opacity:.3\" stroke-width=\"1\"><\u002Fline><!-- Node boxes row 1 --><rect x=\"110\" y=\"58\" width=\"90\" height=\"32\" rx=\"4\" style=\"fill:var(--dim);fill-opacity:.12;stroke:var(--dim)\" stroke-width=\"1\"><\u002Frect><text x=\"155\" y=\"79\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:10px\">Direction<\u002Ftext><rect x=\"230\" y=\"58\" width=\"90\" height=\"32\" rx=\"4\" style=\"fill:var(--dim);fill-opacity:.12;stroke:var(--dim)\" stroke-width=\"1\"><\u002Frect><text x=\"275\" y=\"79\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:10px\">Test Goals<\u002Ftext><rect x=\"350\" y=\"58\" width=\"90\" height=\"32\" rx=\"4\" style=\"fill:var(--dim);fill-opacity:.12;stroke:var(--dim)\" stroke-width=\"1\"><\u002Frect><text x=\"395\" y=\"79\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:10px\">Evaluation<\u002Ftext><!-- Node boxes row 2 (Leon) --><rect x=\"110\" y=\"138\" width=\"90\" height=\"32\" rx=\"4\" fill=\"rgba(255,196,0,0.1)\" stroke=\"#FFC400\" stroke-width=\"1\"><\u002Frect><text x=\"155\" y=\"159\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:10px\">Layouts<\u002Ftext><rect x=\"230\" y=\"138\" width=\"90\" height=\"32\" rx=\"4\" fill=\"rgba(255,196,0,0.1)\" stroke=\"#FFC400\" stroke-width=\"1\"><\u002Frect><text x=\"275\" y=\"159\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:10px\">Content Req.<\u002Ftext><rect x=\"350\" y=\"138\" width=\"90\" height=\"32\" rx=\"4\" fill=\"rgba(255,196,0,0.1)\" stroke=\"#FFC400\" stroke-width=\"1\"><\u002Frect><text x=\"395\" y=\"159\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:10px\">Iterate<\u002Ftext><!-- Node boxes row 3 --><rect x=\"460\" y=\"138\" width=\"88\" height=\"32\" rx=\"4\" style=\"fill:var(--fg);fill-opacity:.06;stroke:var(--fg);stroke-opacity:.3\" stroke-width=\"1\"><\u002Frect><text x=\"504\" y=\"159\" text-anchor=\"middle\" style=\"fill:var(--fg);fill-opacity:.6;font-family:var(--font);font-size:10px\">Impl · QA<\u002Ftext><!-- Arrows row 1 --><line x1=\"200\" y1=\"74\" x2=\"228\" y2=\"74\" style=\"stroke:var(--dim)\" stroke-width=\"1.2\" marker-end=\"url(#w10a)\"><\u002Fline><line x1=\"320\" y1=\"74\" x2=\"348\" y2=\"74\" style=\"stroke:var(--dim)\" stroke-width=\"1.2\" marker-end=\"url(#w10a)\"><\u002Fline><!-- Down arrows prod→leon --><line x1=\"155\" y1=\"90\" x2=\"155\" y2=\"136\" style=\"stroke:var(--dim)\" stroke-width=\"1.2\" marker-end=\"url(#w10a)\"><\u002Fline><line x1=\"275\" y1=\"90\" x2=\"275\" y2=\"136\" style=\"stroke:var(--dim)\" stroke-width=\"1.2\" marker-end=\"url(#w10a)\"><\u002Fline><line x1=\"395\" y1=\"90\" x2=\"395\" y2=\"136\" style=\"stroke:var(--dim)\" stroke-width=\"1.2\" marker-end=\"url(#w10a)\"><\u002Fline><!-- Arrows row 2 --><line x1=\"200\" y1=\"154\" x2=\"228\" y2=\"154\" style=\"stroke:var(--dim)\" stroke-width=\"1.2\" marker-end=\"url(#w10a)\"><\u002Fline><line x1=\"320\" y1=\"154\" x2=\"348\" y2=\"154\" style=\"stroke:var(--dim)\" stroke-width=\"1.2\" marker-end=\"url(#w10a)\"><\u002Fline><line x1=\"440\" y1=\"154\" x2=\"458\" y2=\"154\" style=\"stroke:var(--dim)\" stroke-width=\"1.2\" marker-end=\"url(#w10a)\"><\u002Fline><!-- Feedback loop --><path d=\"M504,170 Q504,204 330,204 Q156,204 155,172\" style=\"stroke:var(--dim)\" stroke-width=\"1.2\" stroke-dasharray=\"4,3\" marker-end=\"url(#w10a)\" fill=\"none\"><\u002Fpath><!-- Label --><text x=\"280\" y=\"215\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">W-10 · ROLE &amp; PRODUCTION FLOW<\u002Ftext><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">OUTCOME<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><ul class=\"ulist\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><li><span class=\"bul\">·<\u002Fspan>Contributed to a repeatable production process for live Stage and Chapter creation.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Clearer balancing logic and a more structured relationship between layout, Economy, pacing, and implementation.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Subsequent tests showed improved progression pacing and Stage completion, though the effect could not be attributed to layout changes alone.<\u002Fli><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><li><span class=\"bul\">·<\u002Fspan>תרמתי לתהליך הפקה חוזר על עצמו ליצירת Stages ו-Chapters חיים.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>לוגיקת איזון ברורה יותר ויחס מובנה יותר בין Layout, Economy, Pacing ומימוש.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>בדיקות מאוחרות הראו שיפור ב-Progression Pacing ובהשלמת Stages, אם כי לא ניתן לייחס את ההשפעה לשינויי Layout בלבד.<\u002Fli><\u002Fsc-if><\u002Ful><div class=\"note\">// Specific performance figures are confidential - available to discuss on request.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\"><div class=\"caseNav\"><span class=\"caseNavBtn disabled\"><\u002Fspan><span class=\"back\" onclick=\"{{ goHome }}\">{{ t.back }}<\u002Fspan><span class=\"caseNavBtn\" onclick=\"{{ goCaseMagic }}\">Magicaland Adventure →<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isCaseMagic }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"page\">\n<div class=\"wrap caseHead\">\n<div class=\"klabel\">{{ t.klCaseStudy02 }}<\u002Fdiv>\n<div class=\"big\" style=\"max-width:18ch\">Magicaland Adventure<\u002Fdiv>\n<div class=\"caseMeta\"><span>{{ t.metaClient }}<b>Coin Master · Moon Active<\u002Fb><\u002Fspan><span>{{ t.metaRole }}<b>Product Level Designer<\u002Fb><\u002Fspan><span>{{ t.metaScope }}<b>Non-Linear MVP · Economy · Tooling · Production<\u002Fb><\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\"><div class=\"cover ph\"><span>cover - Magicaland Adventure map / non-linear routes<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div class=\"wrap\">\n<div class=\"csec\"><div><div class=\"klabel\">OVERVIEW<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>Magicaland Adventure evolved from a production-tested MVP that explored how Coin Master's Expedition model could move beyond a primarily linear progression structure. Based on Product, Business, and Economy requirements, the MVP introduced a controlled Main Road with optional Side Roads - creating space for bonus progression, risk–reward decisions, and deeper future product capabilities.<\u002Fp><p>As a Product Level Designer, I translated this direction into playable layouts, Economy-informed configurations, content and asset requirements, level-building tool requirements, and a production-testable experience. The MVP became a direct foundation for Magicaland Adventure, which continued to evolve through multiple versions and supporting systems.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>Magicaland Adventure התפתח מתוך MVP שנבדק בפרודקשן ובחן כיצד מודל ה-Expedition של Coin Master יכול להתרחב מעבר למבנה Progression ליניארי בעיקרו. בהתבסס על דרישות Product, Business ו-Economy, ה-MVP הציג Main Road מבוקר עם Side Roads אופציונליים, ויצר מקום ל-Bonus Progression, החלטות Risk-Reward ויכולות מוצר עתידיות עמוקות יותר.<\u002Fp><p>כ-Product Level Designer, תרגמתי את הכיוון ל-Playable Layouts, Configurations שמבוססים על Economy, דרישות Content ו-Assets, דרישות ל-Level Builder וחוויה שניתן לבדוק בפרודקשן. ה-MVP הפך לבסיס ישיר ל-Magicaland Adventure, שהמשיך להתפתח לאורך כמה גרסאות.<\u002Fp><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">OPPORTUNITY<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>The existing Expedition model relied on a primarily linear progression structure. This made progression easy to understand and control, but limited optional depth, player agency, and the number of product levers available within the experience.<\u002Fp><p>The opportunity was to explore whether a controlled non-linear structure could introduce meaningful Side Roads, bonus progression, and risk–reward decisions while preserving a clear Main Road - without investing prematurely in a dedicated Economy, Monetization layer, and new Chapter structures before the direction had been validated with real players. The challenge: build enough of the future experience to test it credibly in production, while keeping the MVP constrained, feasible, and compatible with existing systems.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>מודל ה-Expedition הקיים התבסס בעיקר על Progression ליניארי. המבנה היה קל יותר להבנה ולשליטה, אך הגביל עומק אופציונלי, Player Agency ואת מספר ה-Product Levers הזמינים בתוך החוויה.<\u002Fp><p>ההזדמנות הייתה לבחון האם מבנה לא-ליניארי מבוקר יכול להכניס Side Routes משמעותיים, Bonus Progression והחלטות Risk-Reward - תוך שמירה על Main Path ברור. האתגר: לבנות מספיק מחוויית העתיד כדי לבדוק אותה בפרודקשן, בלי להתחייב ל-Economy, Monetization ומבני Chapters מלאים.<\u002Fp><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">ROLE &amp; SCOPE<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>I translated Product, Business, and Economy direction into a production-testable gameplay experience.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>תרגמתי כיוון של Product, Business ו-Economy לחוויית Gameplay שניתנת לבדיקה בפרודקשן.<\u002Fp><\u002Fsc-if><ul class=\"ulist\"><li><span class=\"bul\">·<\u002Fspan>Contributed to concept development, gameplay alternatives, and strategic direction.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Designed Main Road and optional Side Road layouts.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Translated Economy requirements, models, and simulation outputs into playable configurations, iterating on resource distribution, progression parameters, and route structure.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Created mockups, Chapter Dressing, and visual alternatives; planned existing, new, unique, and temporary MVP assets.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Coordinated content needs across Art, Animation, Tech Art, and Development.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Defined Level Builder requirements for the non-linear structure and supported configuration export &amp; integration.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Clarified critical gameplay and configuration scenarios for QA and Operations, and participated in shared triage.<\u002Fli><\u002Ful><div class=\"note\">// Scope: Product and Business owned overall direction and major investment decisions; QA and Operations owned formal testing. My responsibility was to connect these inputs into executable layouts, configurations, content requirements, tooling needs, and testable alternatives.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">MVP<br>EXPERIENCE<br>LOOP<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><svg viewBox=\"0 0 560 168\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:auto;display:block;margin-bottom:20px\"><defs><marker id=\"m01a\" markerWidth=\"7\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 7 3, 0 6\" style=\"fill:var(--dim)\"><\u002Fpolygon><\u002Fmarker><\u002Fdefs><path d=\"M478,72 Q510,72 510,140 Q510,154 280,154 Q50,154 50,140 Q50,72 82,72\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\" marker-end=\"url(#m01a)\" fill=\"none\"><\u002Fpath><line x1=\"118\" y1=\"72\" x2=\"158\" y2=\"72\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" marker-end=\"url(#m01a)\"><\u002Fline><line x1=\"238\" y1=\"72\" x2=\"278\" y2=\"72\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" marker-end=\"url(#m01a)\"><\u002Fline><line x1=\"358\" y1=\"72\" x2=\"398\" y2=\"72\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" marker-end=\"url(#m01a)\"><\u002Fline><!-- N1 Enter --><circle cx=\"80\" cy=\"72\" r=\"34\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><g transform=\"translate(68,60)\" style=\"stroke:var(--dim)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4\"><\u002Fpath><polyline points=\"10 17 15 12 10 7\"><\u002Fpolyline><line x1=\"15\" y1=\"12\" x2=\"3\" y2=\"12\"><\u002Fline><\u002Fg><text x=\"80\" y=\"120\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">ENTER<\u002Ftext><!-- N2 Understand Goal (yellow) --><circle cx=\"200\" cy=\"72\" r=\"34\" stroke=\"#FFC400\" stroke-width=\"1.5\" fill=\"rgba(255,196,0,0.07)\"><\u002Fcircle><g transform=\"translate(188,60)\" stroke=\"#FFC400\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4\"><\u002Fpath><path d=\"M12 8h.01\"><\u002Fpath><\u002Fg><text x=\"200\" y=\"120\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:9px;letter-spacing:.06em\">UNDERSTAND GOAL<\u002Ftext><!-- N3 Core Action --><circle cx=\"320\" cy=\"72\" r=\"34\" stroke=\"#FFC400\" stroke-width=\"1.5\" fill=\"rgba(255,196,0,0.07)\"><\u002Fcircle><g transform=\"translate(308,60)\" stroke=\"#FFC400\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><polygon points=\"6 3 20 12 6 21 6 3\"><\u002Fpolygon><\u002Fg><text x=\"320\" y=\"120\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:9px;letter-spacing:.06em\">CORE ACTION<\u002Ftext><!-- N4 Feedback --><circle cx=\"440\" cy=\"72\" r=\"34\" style=\"stroke:var(--fg);stroke-opacity:.45\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><g transform=\"translate(428,60)\" style=\"stroke:var(--fg)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fg><text x=\"440\" y=\"120\" text-anchor=\"middle\" style=\"fill:var(--fg);fill-opacity:.65;font-family:var(--font);font-size:9px;letter-spacing:.06em\">RECEIVE FEEDBACK<\u002Ftext><text x=\"280\" y=\"163\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">M-01 · MVP EXPERIENCE LOOP<\u002Ftext><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">FROM LINEAR<br>TO NON-LINEAR<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>The MVP shifted the experience from a single progression bar to a map-based system of parallel progression layers - each with its own player value, cost, and milestone logic.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>ה-MVP העביר את החוויה מ-Progress Bar יחיד למערכת מבוססת מפה של שכבות Progression מקבילות - לכל אחת ערך שחקן, עלות ולוגיקת Milestone משלה.<\u002Fp><\u002Fsc-if><div class=\"cmp\"><div class=\"cmpCol\"><div class=\"cmpH\">EXISTING MODEL<\u002Fdiv><ul class=\"cmpL\"><li><span class=\"bul\">·<\u002Fspan>Clearing obstacles directly granted Flags.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Flags filled one Stage Bar.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Movement and progression were mostly the same flow.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>One dominant progression decision.<\u002Fli><\u002Ful><\u002Fdiv><div class=\"cmpCol\"><div class=\"cmpH\">MVP / EVOLVING MODEL<\u002Fdiv><ul class=\"cmpL\"><li><span class=\"bul\">·<\u002Fspan>Flags exist at specific locations, no longer tied to every cleared interaction.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Multiple progression systems operate in parallel.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Movement, destinations, milestones, bars, and route unlocks represent distinct progress.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Players evaluate multiple goals with different costs and rewards.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv><div class=\"dcap\"><span class=\"acc\">?<\u002Fspan> Core player question: which goal should I invest in now, and what does that investment unlock?<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">MAIN ROAD &amp;<br>BONUS ROUTES<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>The MVP introduced a clear Main Road alongside optional Bonus Routes. The Main Road preserved the primary journey and Stage completion path, while Bonus Routes created additional decisions around cost, reward, timing, and opportunity cost.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>ה-MVP הציג Main Road ברור לצד Bonus Routes אופציונליים. ה-Main Road שמר על המסלול העיקרי ועל מסלול השלמת ה-Stage, בעוד ה-Bonus Routes יצרו החלטות נוספות סביב עלות, Reward, תזמון ו-Opportunity Cost.<\u002Fp><\u002Fsc-if><ul class=\"ulist\"><li><span class=\"bul\">·<\u002Fspan><b style=\"color:var(--fg);font-weight:500\">Partial information<\u002Fb> - the route and reward destination were visible, but exact cost and full reward value were not always exposed in advance, preserving curiosity and discovery.<\u002Fli><li><span class=\"bul\">·<\u002Fspan><b style=\"color:var(--fg);font-weight:500\">Backtracking<\u002Fb> - players could return along a cleared path; previously cleared obstacles stayed open, with no repeated Potion cost.<\u002Fli><li><span class=\"bul\">·<\u002Fspan><b style=\"color:var(--fg);font-weight:500\">Optional by design<\u002Fb> - Bonus Routes were not required to complete the Stage, but could offer meaningful value inside the event and across the wider product.<\u002Fli><\u002Ful><div class=\"note\">// Optional, potentially high-value, and tested under limited MVP conditions.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">PARALLEL<br>PROGRESSION<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>The MVP introduced multiple progression layers that could advance in parallel rather than through a single bar. Each layer represented a different player goal, cost, dependency, or reward - the challenge was creating meaningful choice without losing clarity about the primary journey.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>ה-MVP הציג שכבות Progression מרובות שיכלו להתקדם במקביל במקום דרך Bar יחיד. כל שכבה ייצגה יעד שחקן, עלות, תלות או Reward שונה - האתגר היה יצירת בחירה משמעותית בלי לאבד בהירות לגבי המסלול העיקרי.<\u002Fp><\u002Fsc-if><div class=\"dsub\"><span class=\"chip\">Main Road<\u002Fspan><span class=\"chip\">Side Road<\u002Fspan><span class=\"chip\">Flags<\u002Fspan><span class=\"chip\">Activities<\u002Fspan><span class=\"chip\">Milestones<\u002Fspan><span class=\"chip\">Route unlocks<\u002Fspan><span class=\"chip\">Achievements<\u002Fspan><span class=\"chip\">Golden Journey<\u002Fspan><span class=\"chip\">Parallel bars<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">CORE–EVENT<br>ECONOMY<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>These decisions operated within a broader core–event Economy loop. Players evaluated not only what an action unlocked inside the Expedition, but also what value the event returned to the core game - and which core resources were worth investing back into the event.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>ההחלטות הללו פעלו בתוך Core-Event Economy Loop רחב יותר. השחקנים בחנו לא רק מה פעולה פותחת בתוך ה-Expedition, אלא גם איזה ערך האירוע מחזיר ל-Core Game - ואילו משאבי Core שווה להשקיע בחזרה באירוע.<\u002Fp><\u002Fsc-if><div style=\"margin-top:20px;display:flex;align-items:stretch;gap:0\"><div style=\"flex:1;border:1px solid var(--chipborder);background:var(--panel);border-radius:9px 0 0 9px;padding:20px 22px\"><div class=\"cmpH\" style=\"margin-bottom:10px\">COIN MASTER CORE<\u002Fdiv><div style=\"font-size:14px;line-height:1.55;color:var(--muted)\">Spins, coins, and other core resources feed into event participation. Each session is an opportunity cost decision.<\u002Fdiv><\u002Fdiv><div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:0 18px;background:var(--panel2);border-top:1px solid var(--chipborder);border-bottom:1px solid var(--chipborder)\"><div style=\"display:flex;align-items:center;gap:8px;font-family:var(--font);font-size:12px;color:var(--acc)\"><div style=\"background:var(--acc);color:var(--accfg);border-radius:4px;padding:3px 8px;font-weight:600;white-space:nowrap\">→ invest<\u002Fdiv><div style=\"color:var(--dim);font-size:11px;max-width:100px;text-align:center\">resources &amp; opportunity cost<\u002Fdiv><\u002Fdiv><div style=\"width:1px;height:20px;background:var(--line2)\"><\u002Fdiv><div style=\"display:flex;align-items:center;gap:8px;font-family:var(--font);font-size:12px;color:var(--acc)\"><div style=\"color:var(--dim);font-size:11px;max-width:100px;text-align:center\">rewards &amp; progression value<\u002Fdiv><div style=\"background:var(--acc);color:var(--accfg);border-radius:4px;padding:3px 8px;font-weight:600;white-space:nowrap\">← return<\u002Fdiv><\u002Fdiv><\u002Fdiv><div style=\"flex:1;border:1px solid var(--chipborder);background:var(--panel);border-radius:0 9px 9px 0;padding:20px 22px\"><div class=\"cmpH\" style=\"margin-bottom:10px\">MAGICALAND EVENT<\u002Fdiv><div style=\"font-size:14px;line-height:1.55;color:var(--muted)\">Route and activity choices inside the event determine what rewards flow back - spins, gems, and wider product utility.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"note\" style=\"margin-top:16px\">// Route and activity choices were evaluated through their relationship with the wider Coin Master ecosystem, not in isolation. Exact reward values and Economy mechanics are confidential.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">MVP STRATEGY<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>The MVP was the smallest credible version that could produce meaningful player behavior in production - enough depth to test real behavior, but not so much that the team became locked into an unvalidated Economy or content model.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>ה-MVP היה הגרסה האמינה הקטנה ביותר שיכלה לייצר התנהגות משמעותית של שחקנים בפרודקשן - עומק מספיק לבדיקת התנהגות אמיתית, אך לא כל כך הרבה שהצוות ייכנס לנעילה ב-Economy או במודל Content שעדיין לא עברו ולידציה.<\u002Fp><\u002Fsc-if><div class=\"cmp\"><div class=\"cmpCol\"><div class=\"cmpH\">BUILT FOR VALIDATION<\u002Fdiv><ul class=\"cmpL\"><li><span class=\"bul\">·<\u002Fspan>Playable non-linear route structure<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Minimum viable Economy adaptation<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Progression and activity logic<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Visual clarity and sufficient content<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Minimum builder + export support<\u002Fli><\u002Ful><\u002Fdiv><div class=\"cmpCol\"><div class=\"cmpH\">DEFERRED UNTIL VALIDATED<\u002Fdiv><ul class=\"cmpL\"><li><span class=\"bul\">·<\u002Fspan>Full future Economy system<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Dedicated Monetization layers<\u002Fli><li><span class=\"bul\">·<\u002Fspan>New full Chapter structures<\u002Fli><li><span class=\"bul\">·<\u002Fspan>A broader tooling platform<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Deeper product expansion<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">MVP SCOPE &amp;<br>FRICTION<br>REDUCTION<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><svg viewBox=\"0 0 560 200\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:auto;display:block;margin-bottom:20px\"><defs><marker id=\"m02a\" markerWidth=\"7\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 7 3, 0 6\" style=\"fill:var(--dim)\"><\u002Fpolygon><\u002Fmarker><marker id=\"m02y\" markerWidth=\"7\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 7 3, 0 6\" fill=\"#FFC400\"><\u002Fpolygon><\u002Fmarker><\u002Fdefs><!-- Funnel shape --><path d=\"M20,20 L540,20 L420,90 L140,90 Z\" style=\"fill:var(--dim);fill-opacity:.07;stroke:var(--dim)\" stroke-width=\"1\"><\u002Fpath><path d=\"M140,90 L420,90 L350,150 L210,150 Z\" style=\"fill:var(--dim);fill-opacity:.1;stroke:var(--dim)\" stroke-width=\"1\"><\u002Fpath><path d=\"M210,150 L350,150 L310,185 L250,185 Z\" fill=\"rgba(255,196,0,0.12)\" stroke=\"#FFC400\" stroke-width=\"1.2\"><\u002Fpath><!-- Labels inside funnel --><text x=\"280\" y=\"50\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:11px;letter-spacing:.05em\">Broad concept + full feature scope<\u002Ftext><text x=\"280\" y=\"120\" text-anchor=\"middle\" style=\"fill:var(--fg);font-family:var(--font);font-size:11px;letter-spacing:.04em\">Identify friction · prioritise use cases<\u002Ftext><text x=\"280\" y=\"170\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:11px;letter-spacing:.04em;font-weight:600\">Learnable MVP<\u002Ftext><!-- Step labels right --><text x=\"546\" y=\"24\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">01<\u002Ftext><text x=\"546\" y=\"94\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">02<\u002Ftext><text x=\"546\" y=\"154\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:9px;letter-spacing:.06em\">03<\u002Ftext><!-- Side note annotations --><line x1=\"14\" y1=\"55\" x2=\"14\" y2=\"90\" style=\"stroke:var(--dim)\" stroke-width=\"1\" stroke-dasharray=\"2,2\"><\u002Fline><text x=\"6\" y=\"52\" style=\"fill:var(--dim);font-family:var(--font);font-size:8px\">→ scope<\u002Ftext><text x=\"6\" y=\"64\" style=\"fill:var(--dim);font-family:var(--font);font-size:8px\">reduction<\u002Ftext><text x=\"280\" y=\"198\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">M-02 · MVP SCOPE &amp; FRICTION REDUCTION<\u002Ftext><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">DECISIONS &amp;<br>TRADE-OFFS<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><div class=\"trade\"><div class=\"tradeRow\"><div class=\"tradeD\">Parallel progression<\u002Fdiv><div class=\"tradeT\">More player agency and product levers <b>vs<\u002Fb> higher cognitive, Economy, balancing, and production complexity.<\u002Fdiv><\u002Fdiv><div class=\"tradeRow\"><div class=\"tradeD\">Main Road with optional Side Roads<\u002Fdiv><div class=\"tradeT\">Meaningful route choice <b>vs<\u002Fb> preserving a clear primary journey and measurable progression.<\u002Fdiv><\u002Fdiv><div class=\"tradeRow\"><div class=\"tradeD\">Minimum viable Economy<\u002Fdiv><div class=\"tradeT\">Credible player decisions <b>vs<\u002Fb> avoiding premature commitment to the final Economy.<\u002Fdiv><\u002Fdiv><div class=\"tradeRow\"><div class=\"tradeD\">Reuse before expansion<\u002Fdiv><div class=\"tradeT\">Speed and technical feasibility <b>vs<\u002Fb> bespoke content and future flexibility.<\u002Fdiv><\u002Fdiv><div class=\"tradeRow\"><div class=\"tradeD\">Minimum required tooling<\u002Fdiv><div class=\"tradeT\">Production readiness <b>vs<\u002Fb> premature investment in a full tooling platform.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">PRODUCT<br>EVOLUTION<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>The MVP did not remain an isolated experiment. It became a direct product foundation, expanded across later versions with additional systems, features, and content.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>ה-MVP לא נשאר ניסוי מבודד. הוא הפך לבסיס מוצרי ישיר שהתרחב בגרסאות מאוחרות באמצעות מערכות, פיצ׳רים, Content ויכולות תומכות נוספות.<\u002Fp><\u002Fsc-if><div class=\"diagram\"><div class=\"dloop\"><div class=\"dnode\"><div class=\"dnum\">01<\u002Fdiv><div class=\"dnt\">Linear Expedition<\u002Fdiv><div class=\"dns\">The original primarily-linear progression model.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">02<\u002Fdiv><div class=\"dnt\">Production-tested MVP<\u002Fdiv><div class=\"dns\">Validated controlled non-linear progression.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">03<\u002Fdiv><div class=\"dnt\">Magicaland V1<\u002Fdiv><div class=\"dns\">Main Road, Side Road &amp; parallel progression logic.<\u002Fdiv><\u002Fdiv><div class=\"darrow\">→<\u002Fdiv><div class=\"dnode\"><div class=\"dnum\">04<\u002Fdiv><div class=\"dnt\">Later versions<\u002Fdiv><div class=\"dns\">Added systems, capabilities &amp; operational expansion.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"dcap\"><span class=\"acc\">↺<\u002Fspan> The MVP established a progression and production model that could support continued evolution.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">OUTCOME<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><ul class=\"ulist\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><li><span class=\"bul\">·<\u002Fspan>The MVP was tested in production and became a direct foundation for Magicaland Adventure.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>The experience continued through multiple versions and additional capabilities.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Established a repeatable progression and production model beyond a single feature concept.<\u002Fli><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><li><span class=\"bul\">·<\u002Fspan>ה-MVP נבדק בפרודקשן והפך לבסיס ישיר ל-Magicaland Adventure.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>החוויה המשיכה להתפתח לאורך כמה גרסאות ויכולות נוספות.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>ביסס מודל Progression והפקה חוזר שיכול לתמוך בהתפתחות מוצרית מתמשכת.<\u002Fli><\u002Fsc-if><\u002Ful><div class=\"note\">// Specific performance data is confidential or expressed cautiously where evidence is limited.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\"><div class=\"caseNav\"><span class=\"caseNavBtn\" onclick=\"{{ goCase }}\">Wildland Adventure<\u002Fspan><span class=\"back\" onclick=\"{{ goHome }}\">{{ t.back }}<\u002Fspan><span class=\"caseNavBtn\" onclick=\"{{ goCaseFish }}\">Fish Game →<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isCaseFish }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"page\">\n<div class=\"wrap caseHead\">\n<div class=\"klabel\">{{ t.klCaseStudy03 }}<\u002Fdiv>\n<div class=\"big\" style=\"max-width:14ch\">Fish Game<\u002Fdiv>\n<div class=\"caseMeta\"><span>{{ t.metaClient }}<b>Effectivate<\u002Fb><\u002Fspan><span>{{ t.metaRole }}<b>Product Game Designer<\u002Fb><\u002Fspan><span>{{ t.metaYear }}<b>2023 - 2024<\u002Fb><\u002Fspan><span>{{ t.metaScope }}<b>Accessible UX · Adaptive Game Systems<\u002Fb><\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\"><div class=\"cover ph\"><span>cover - Fish Game key screen / cognitive-training UI<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div class=\"wrap\">\n<div class=\"csec\"><div><div class=\"klabel\">PURPOSE<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>Translating research, cognitive goals, accessibility needs, and audience behavior into an adaptive B2C game experience - designed so an older audience could engage confidently with cognitive-training gameplay.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>תרגום מחקר, יעדים קוגניטיביים, צורכי נגישות והתנהגות קהל לחוויית משחק B2C אדפטיבית - עוצבה כך שקהל מבוגר יוכל לעסוק בביטחון ב-Gameplay של אימון קוגניטיבי.<\u002Fp><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">AUDIENCE<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>The experience was built for older adults, where clarity, confidence, and motivation matter as much as challenge. Design decisions balanced cognitive needs, accessibility, comprehension, and engagement, while staying feasible to build.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>החוויה נבנתה עבור מבוגרים, שאצלם בהירות, ביטחון ומוטיבציה חשובים לא פחות מאתגר. החלטות העיצוב איזנו בין צרכים קוגניטיביים, נגישות, הבנה ומעורבות, תוך שמירה על ישימות בנייה.<\u002Fp><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">APPROACH<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><ul class=\"ulist\"><li><span class=\"bul\">·<\u002Fspan>Translated research and product goals into accessible game systems, UX flows, layouts, and interactive experiences.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Designed adaptive gameplay that calibrated challenge to the player while preserving clarity and motivation.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Worked closely with Development to turn design concepts into feasible, production-ready features.<\u002Fli><\u002Ful><div class=\"note\">// Detailed product context, decisions, collaboration, and outcomes for this case are being written up - available to discuss on request.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\"><div class=\"caseNav\"><span class=\"caseNavBtn\" onclick=\"{{ goCaseMagic }}\">Magicaland Adventure<\u002Fspan><span class=\"back\" onclick=\"{{ goHome }}\">{{ t.back }}<\u002Fspan><span class=\"caseNavBtn disabled\">→<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<div class=\"foot\" id=\"contact\">\n<div class=\"wrap\">\n<div class=\"klabel\">{{ t.secContact }}<\u002Fdiv>\n<div class=\"footGrid\">\n<div class=\"footBig\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\">Let's talk about product, UX, game systems, and <em>complex B2C experiences.<\u002Fem><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\">{{ t.contactHed }}<\u002Fsc-if><\u002Fdiv>\n<div class=\"footR\">\n<div><a class=\"mail\" href=\"mailto:[your@email.com]\">[your@email.com]<\u002Fa><\u002Fdiv>\n\n<div><a class=\"footLink\" href=\"https://www.linkedin.com/\" target=\"_blank\">LinkedIn<\u002Fa><\u002Fdiv>\n<div><span class=\"footLink\" onclick=\"{{ openGate }}\">Behance<span class=\"lockg\">· protected<\u002Fspan><\u002Fspan><\u002Fdiv>\n<div><span class=\"footLink\" style=\"opacity:.4;cursor:default\">[resume — add link]<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<sc-if value=\"{{ gateOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"overlay\">\n<div class=\"modal\">\n<div class=\"mTop\"><div class=\"mTitle\">// PROTECTED_WORK<\u002Fdiv><div class=\"mX\" onclick=\"{{ closeGate }}\">✕<\u002Fdiv><\u002Fdiv>\n<div class=\"mDesc\">Behance drafts and selected case studies are password-protected. Enter the access code to continue - it'll open in a new tab.<\u002Fdiv>\n<input class=\"gateInput\" type=\"password\" placeholder=\"access code\" oninput=\"{{ onVal }}\" onkeydown=\"{{ onKey }}\">\n<sc-if value=\"{{ gateErr }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"gateErr\">✕ incorrect code - try again or reach out for access.<\u002Fdiv><\u002Fsc-if>\n<button class=\"gateBtn\" onclick=\"{{ submitGate }}\">unlock<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n\n<div class=\"{{ settPanelCls }}\" data-comment-anchor=\"42a79266d2-div\">\n<div class=\"a11yHead\"><span>// PERSONALIZE<\u002Fspan><span class=\"mX\" onclick=\"{{ closeSettings }}\">✕<\u002Fspan><\u002Fdiv>\n<div class=\"a11yRow\" onclick=\"{{ toggleTheme }}\"><span>{{ themeLabel }}<\u002Fspan><div class=\"themeBtn\" style=\"border:none;width:24px;height:24px;font-size:14px\">{{ themeIcon }}<\u002Fdiv><\u002Fdiv>\n<div class=\"a11yRow\" onclick=\"{{ toggleLang }}\"><span>Language<\u002Fspan><span class=\"{{ langBtnCls }}\" style=\"font-size:11px;padding:3px 8px\">{{ t.langToggle }}<\u002Fspan><\u002Fdiv>\n<div class=\"settDivider\"><\u002Fdiv>\n<div class=\"a11yHead\" style=\"margin-top:6px\"><span>// ACCESSIBILITY<\u002Fspan><\u002Fdiv>\n<div class=\"{{ clsLg }}\" onclick=\"{{ tglLg }}\"><span>Larger text<\u002Fspan><span class=\"a11ySw\"><span class=\"a11ySwDot\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n<div class=\"{{ clsContrast }}\" onclick=\"{{ tglContrast }}\"><span>High contrast<\u002Fspan><span class=\"a11ySw\"><span class=\"a11ySwDot\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n<div class=\"{{ clsMotion }}\" onclick=\"{{ tglMotion }}\"><span>Reduce motion<\u002Fspan><span class=\"a11ySw\"><span class=\"a11ySwDot\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n<div class=\"{{ clsUnderline }}\" onclick=\"{{ tglUnderline }}\"><span>Underline links<\u002Fspan><span class=\"a11ySw\"><span class=\"a11ySwDot\"><\u002Fspan><\u002Fspan><\u002Fdiv>\n<div class=\"a11yReset\" onclick=\"{{ resetA11y }}\">↺ reset all<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;green&quot;,&quot;amber&quot;,&quot;blue&quot;,&quot;magenta&quot;],&quot;default&quot;:&quot;amber&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;typeface&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;schibsted&quot;,&quot;sora&quot;,&quot;space&quot;],&quot;default&quot;:&quot;schibsted&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showGrid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;behancePassword&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Llleoononn202690&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  static TRANS = {\n    en: {\n      navWork:'work', navAbout:'about', navProcess:'process', navContact:'contact', navResume:'resume.pdf',\n      langToggle:'HE',\n      heroMeta1:'ROLE', heroMeta1v:'Product Designer · Game UX',\n      heroMeta2:'FOCUS', heroMeta2v:'Systems · Progression · Live Ops',\n      heroMeta3:'LOC', heroMeta3v:'Israel / Remote',\n      heroTitle:'Designing systems players ', heroTitleEm:'actually understand.',\n      heroLede:'I work across product thinking, UX, game systems, and cross-functional execution - translating user, business, Economy, and technical constraints into experiences that can be built, tested, and evolved.',\n      heroBtn1:'View selected work', heroBtn2:'About me',\n      heroStatus:'Product Design · Game UX · Available',\n      secWork:'// SELECTED_WORK', secCaps:'// CAPABILITIES', secSystems:'// SELECTED_SYSTEMS',\n      secContact:'// CONTACT', secAbout:'// ABOUT', secExp:'// EXPERIENCE', secEdu:'// EDUCATION & languages',\n      secProcess:'// PROCESS',\n      contactHed:\"Let's build products that make complex systems feel clear.\",\n      mobStatus:'Leon Maimon · 2026',\n      back:'all work',\n      procHed:'From problem framing to live iteration.',\n      procLede1:'I work across the product development cycle and stay close to the disciplines that shape the final experience - Product, Game Design, Economy, Art, and Engineering.',\n
