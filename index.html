  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"row\" onclick=\"{{ goCaseFish }}\"><span class=\"rnum\">03<\u002Fspan><div><div class=\"rt\">Fish Game<\u002Fdiv><div class=\"rco\">effectivate<\u002Fdiv><\u002Fdiv><div class=\"rd\">{{ t.rowFishDesc }}<\u002Fdiv><div class=\"rgo open\">read case →<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\" style=\"padding-top:64px\">\n<div class=\"klabel\">// CAPABILITIES<\u002Fdiv>\n<div class=\"chipsWrap\"><div class=\"chips\"><span class=\"chip\">UX flows<\u002Fspan><span class=\"chip\">Interaction design<\u002Fspan><span class=\"chip\">Design systems<\u002Fspan><span class=\"chip\">Game UX<\u002Fspan><span class=\"chip\">Level design<\u002Fspan><span class=\"chip\">Player-facing flows<\u002Fspan><span class=\"chip\">Internal tools<\u002Fspan><span class=\"chip\">PRDs<\u002Fspan><span class=\"chip\">Stakeholder alignment<\u002Fspan><span class=\"chip\">Figma<\u002Fspan><span class=\"chip\">AI-assisted workflows<\u002Fspan><span class=\"chip\">UX flows<\u002Fspan><span class=\"chip\">Interaction design<\u002Fspan><span class=\"chip\">Design systems<\u002Fspan><span class=\"chip\">Game UX<\u002Fspan><span class=\"chip\">Level design<\u002Fspan><span class=\"chip\">Player-facing flows<\u002Fspan><span class=\"chip\">Internal tools<\u002Fspan><span class=\"chip\">PRDs<\u002Fspan><span class=\"chip\">Stakeholder alignment<\u002Fspan><span class=\"chip\">Figma<\u002Fspan><span class=\"chipsDup\"><span class=\"chip\">AI-assisted workflows<\u002Fspan><\u002Fspan><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap systemsWrap\" style=\"padding-top:64px;padding-bottom:80px\">\n<div class=\"secHead\"><span>{{ t.secSystems }}<\u002Fspan><span><b>02<\u002Fb> caselets<\u002Fspan><\u002Fdiv>\n<div class=\"row\" style=\"cursor:default\"><span class=\"rnum\">01<\u002Fspan><div><div class=\"rt\" style=\"font-size:21px\">Social Expedition Builder Support<\u002Fdiv><div class=\"rco\">coin_master · moon_active<\u002Fdiv><\u002Fdiv><div class=\"rd\">Extending a single-player production tool to support social gameplay. Work included research, PRD, acceptance criteria, critical use cases, cross-functional coordination, and delivery acceptance across game systems, client, server, builder, Unity, and the production pipeline.<\u002Fdiv><div class=\"rgo lock\" style=\"font-size:11px;color:var(--dim)\">internal · protected<\u002Fdiv><\u002Fdiv>\n<div class=\"row\" style=\"cursor:default\"><span class=\"rnum\">02<\u002Fspan><div><div class=\"rt\" style=\"font-size:21px\">Multi-select &amp; Internal Tooling<\u002Fdiv><div class=\"rco\">coin_master · moon_active<\u002Fdiv><\u002Fdiv><div class=\"rd\">Defining a consistent multi-select interaction model across an internal level-building product. Audited where multi-select should exist, mapped supported actions (move, delete, duplicate, align, edit), and prioritized against Development capacity through a focused PRD review cycle.<\u002Fdiv><div class=\"rgo lock\" style=\"font-size:11px;color:var(--dim)\">internal · protected<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isAbout }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"page\">\n<div class=\"wrap\" style=\"padding:84px 40px 20px\">\n<div class=\"klabel\">// ABOUT<\u002Fdiv>\n<div class=\"aboutTop\"><div class=\"lead\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><span class=\"leadFirst\">My background spans product thinking, UX, <span class=\"acc\">game design<\u002Fspan>, <span class=\"acc\">progression systems<\u002Fspan>, research, content production, and internal tools.<\u002Fspan><br><br>I have worked on <span class=\"acc\">player-facing experiences<\u002Fspan> and production systems, often in roles that required connecting Product, Design, Economy, Art, Development, QA, Operations, and Research.<br><br>This breadth is most useful when the product is complex: when user behavior, business goals, system constraints, content, and implementation all need to work together.<\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\">הרקע שלי משתרע על חשיבה מוצרית, UX, עיצוב משחקים, מערכות Progression, מחקר, הפקת תוכן וכלים פנימיים.<br><br>עבדתי על חוויות שפונות לשחקנים ועל מערכות הפקה, לרוב בתפקידים שדרשו חיבור בין Product, Design, Economy, Art, Development, QA, Operations ומחקר.<br><br>הרוחב הזה שימושי ביותר כשהמוצר מורכב: כשהתנהגות משתמשים, יעדים עסקיים, אילוצי מערכת, תוכן ומימוש צריכים לעבוד יחד.<\u002Fsc-if><\u002Fdiv><div class=\"aboutPhoto\"><img src=\"aedfd290-b166-4eab-a43e-b83bca6c3d04\" alt=\"Leon Maimon\" data-comment-anchor=\"b65115d896-img\"><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\" style=\"padding-top:40px\">\n<div class=\"secHead\"><span>{{ t.secExp }}<\u002Fspan><span>10+ years<\u002Fspan><\u002Fdiv>\n<div class=\"exp\"><div class=\"expYr\">2024 - 2026<\u002Fdiv><div><div class=\"expCo\">Moon Active<\u002Fdiv><div class=\"expRole\">Product Level Designer<\u002Fdiv><ul class=\"ulist\"><li><span class=\"bul\">·<\u002Fspan>Designed high-level stage layouts, progression structures, obstacle placement, resource distribution, and reward pacing for Wildland Adventure.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Worked with Product and Economy to translate test goals and business direction into executable gameplay layouts and iterations.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Coordinated content requirements and delivery across Art, Animation, Development, QA, Tech Art, Monetization, Operations, and Platform.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Defined requirements, use cases, and acceptance criteria for internal level-building tools, and supported implementation through validation and QA.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Contributed to discovery and feasibility work for new gameplay concepts, systems, and future feature capabilities.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n<div class=\"exp\"><div class=\"expYr\">2023 - 2024<\u002Fdiv><div><div class=\"expCo\">Effectivate<\u002Fdiv><div class=\"expRole\">Product Game Designer<\u002Fdiv><ul class=\"ulist\"><li><span class=\"bul\">·<\u002Fspan>Translated research, user needs, and product goals into accessible game systems, UX flows, layouts, and interactive experiences.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Designed gameplay concepts and adaptive experiences for an older B2C audience, balancing cognitive needs, engagement, and technical constraints.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Worked closely with Development to turn design concepts into feasible, production-ready features.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Supported design interns and introduced workflow guidelines that improved consistency and sprint execution.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n<div class=\"exp\"><div class=\"expYr\">2020 - 2022<\u002Fdiv><div><div class=\"expCo\">Self-Employed<\u002Fdiv><div class=\"expRole\">Concept Artist &amp; Game Artist<\u002Fdiv><ul class=\"ulist\"><li><span class=\"bul\">·<\u002Fspan>Created environments, icons, UI elements, characters, and visual assets for casual mobile games, including work for Muuula Games.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Delivered assets from early concepts to production-ready files, with a focus on mobile readability, visual hierarchy, and implementation constraints.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n<div class=\"exp\"><div class=\"expYr\">2019 - 2020<\u002Fdiv><div><div class=\"expCo\">Hillel Israel<\u002Fdiv><div class=\"expRole\">Program Manager<\u002Fdiv><ul class=\"ulist\"><li><span class=\"bul\">·<\u002Fspan>Managed social initiatives and exhibitions, including planning, stakeholder coordination, budgets, timelines, and delivery.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n<div class=\"exp\"><div class=\"expYr\">2014 - 2015<\u002Fdiv><div><div class=\"expCo\">Seedr<\u002Fdiv><div class=\"expRole\">UX/UI Designer<\u002Fdiv><ul class=\"ulist\"><li><span class=\"bul\">·<\u002Fspan>Designed web and product interfaces, wireframes, high-fidelity layouts, and user flows in an early-stage startup environment.<\u002Fli><\u002Ful><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\" style=\"padding-top:64px\">\n<div class=\"secHead\"><span>// EDUCATION<\u002Fspan><span>&amp; languages<\u002Fspan><\u002Fdiv>\n<div class=\"eduRow\"><div class=\"expYr\">2021 - Present<\u002Fdiv><div><div class=\"eduT\">M.A. Digital Game Design &amp; Development<\u002Fdiv><div class=\"eduM\">Shenkar College of Engineering, Design and Art<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"eduRow\"><div class=\"expYr\">2015 - 2020<\u002Fdiv><div><div class=\"eduT\">B.Des Industrial Design<\u002Fdiv><div class=\"eduM\">Jerusalem Multidisciplinary College<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"eduRow\"><div class=\"expYr\">languages<\u002Fdiv><div><div class=\"chips\"><span class=\"chip\">Hebrew - Native<\u002Fspan><span class=\"chip\">English - Fluent<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isProcess }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"page\">\n<div class=\"wrap\" style=\"padding:84px 40px 20px\">\n<div class=\"klabel\">// PROCESS<\u002Fdiv>\n<div class=\"big\" style=\"max-width:18ch\">{{ t.procHed }}<\u002Fdiv>\n<div class=\"lede\" style=\"margin-top:24px\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\">I work across the product development cycle and stay close to the disciplines that shape the final experience - Product, Game Design, Economy, Art, and Engineering.<br><br>My focus is on connecting systems, player behavior, business goals, and technical constraints - then translating that understanding into clear, executable solutions.<\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\">{{ t.procLede1 }}<br><br>{{ t.procLede2 }}<\u002Fsc-if><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\" style=\"padding-top:30px\">\n<div class=\"step\"><div class=\"stepNum\">01<\u002Fdiv><div><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"stepT\">Frame the problem<\u002Fdiv><div class=\"stepD\">Clarify what we are trying to improve, why it matters, and how success should be evaluated. Understand the player need, product intent, business context, and key constraints before moving into solutions.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">problem framing<\u002Fspan><span class=\"tag\">goals<\u002Fspan><span class=\"tag\">constraints<\u002Fspan><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"stepT\">הגדרת הבעיה<\u002Fdiv><div class=\"stepD\">להבהיר מה אנחנו מנסים לשפר, למה זה חשוב ואיך מוגדרת ההצלחה. להבין את צורך השחקן, הכוונה המוצרית, ההקשר העסקי והאילוצים המרכזיים לפני שנכנסים לפתרונות.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">הגדרת הבעיה<\u002Fspan><span class=\"tag\">יעדים<\u002Fspan><span class=\"tag\">אילוצים<\u002Fspan><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"step\"><div class=\"stepNum\">02<\u002Fdiv><div><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"stepT\">Design the system<\u002Fdiv><div class=\"stepD\">Map how mechanics, economy, progression, content, and player behavior interact as one connected system. Identify the trade-offs, dependencies, and boundaries that will shape the experience.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">systems<\u002Fspan><span class=\"tag\">economy<\u002Fspan><span class=\"tag\">progression<\u002Fspan><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"stepT\">עיצוב המערכת<\u002Fdiv><div class=\"stepD\">למפות כיצד מכניקות, Economy, Progression, תוכן והתנהגות שחקנים מתקשרים כמערכת מחוברת אחת. לזהות את ה-Trade-offs, התלויות והגבולות שיעצבו את החוויה.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">מערכות<\u002Fspan><span class=\"tag\">Economy<\u002Fspan><span class=\"tag\">Progression<\u002Fspan><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"step\"><div class=\"stepNum\">03<\u002Fdiv><div><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"stepT\">Shape the experience<\u002Fdiv><div class=\"stepD\">Translate the system into clear player-facing flows, layouts, interaction states, and edge cases. Balance readability, pacing, motivation, and friction within the product's existing patterns and design language.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">ux flows<\u002Fspan><span class=\"tag\">layouts<\u002Fspan><span class=\"tag\">interaction<\u002Fspan><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"stepT\">עיצוב החוויה<\u002Fdiv><div class=\"stepD\">לתרגם את המערכת לזרימות ברורות שפונות לשחקן, Layouts, מצבי אינטראקציה ו-Edge Cases. לאזן קריאות, Pacing, מוטיבציה וחיכוך בתוך הדפוסים ושפת העיצוב הקיימים של המוצר.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">זרימות UX<\u002Fspan><span class=\"tag\">layouts<\u002Fspan><span class=\"tag\">אינטראקציה<\u002Fspan><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"step\"><div class=\"stepNum\">04<\u002Fdiv><div><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"stepT\">Define and deliver<\u002Fdiv><div class=\"stepD\">Translate decisions into requirements, specifications, use cases, and acceptance criteria. Plan around release constraints, surface dependencies, and support implementation through iteration, QA, and validation.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">requirements<\u002Fspan><span class=\"tag\">delivery<\u002Fspan><span class=\"tag\">qa<\u002Fspan><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"stepT\">הגדרה ואספקה<\u002Fdiv><div class=\"stepD\">לתרגם החלטות לדרישות, מפרטים, Use Cases ו-Acceptance Criteria. לתכנן סביב אילוצי Release, לחשוף תלויות ולתמוך במימוש דרך איטרציה, QA וולידציה.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">דרישות<\u002Fspan><span class=\"tag\">אספקה<\u002Fspan><span class=\"tag\">QA<\u002Fspan><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"step\"><div class=\"stepNum\">05<\u002Fdiv><div><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><div class=\"stepT\">Learn and iterate<\u002Fdiv><div class=\"stepD\">Review test results, behavioral data, and player feedback, then translate the findings into the next iteration. In live products, learning, production, and delivery often happen in parallel.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">live ops<\u002Fspan><span class=\"tag\">data<\u002Fspan><span class=\"tag\">iteration<\u002Fspan><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"stepT\">לימוד ואיטרציה<\u002Fdiv><div class=\"stepD\">לסקור תוצאות בדיקות, נתוני התנהגות ופידבק שחקנים, ולתרגם את הממצאים לאיטרציה הבאה. במוצרים Live, לימוד, הפקה ואספקה מתרחשים לעיתים קרובות במקביל.<\u002Fdiv><div class=\"stepTags\"><span class=\"tag\">Live Ops<\u002Fspan><span class=\"tag\">נתונים<\u002Fspan><span class=\"tag\">איטרציה<\u002Fspan><\u002Fdiv><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isCase }}\" hint-placeholder-val=\"{{ false }}\">\n<div class=\"page\">\n<div class=\"wrap caseHead\">\n<div class=\"klabel\">{{ t.klCaseStudy01 }}<\u002Fdiv>\n<div class=\"big\" style=\"max-width:14ch\">Wildland Adventure<\u002Fdiv>\n<div class=\"caseMeta\"><span>{{ t.metaClient }}<b>Coin Master · Moon Active<\u002Fb><\u002Fspan><span>{{ t.metaRole }}<b>Product Level Designer<\u002Fb><\u002Fspan><span>{{ t.metaYear }}<b>2024 - 2026<\u002Fb><\u002Fspan><span>{{ t.metaScope }}<b>Progression Layout · Economy · Content · Tooling<\u002Fb><\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"wrap\"><div class=\"cover\" style=\"border-radius:8px;overflow:hidden;margin-bottom:8px\"><img src=\"3f87ad9a-ff6a-47a2-906a-5964b12440b4\" alt=\"Wildland Adventure\" style=\"width:100%;height:280px;object-fit:cover;object-position:center 30%;display:block\"><\u002Fdiv><\u002Fdiv>\n<div class=\"wrap\">\n<div class=\"csec\"><div><div class=\"klabel\">OVERVIEW<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>Wildland Adventure is an exploration and progression feature inside Coin Master. Players collect Potions, clear obstacles, earn Flags, fill the Stage progress bar, receive rewards, and advance through a structured path.<\u002Fp><p>As the first Product Level Designer dedicated to the feature, I designed high-level Stage layouts and translated Economy and Product direction into executable progression experiences, while coordinating content production, implementation, testing, and iteration.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>Wildland Adventure הוא פיצ׳ר חקירה ו-Progression בתוך Coin Master. השחקנים אוספים Potions, מפנים Obstacles, צוברים Flags, ממלאים את ה-Stage Progress Bar, מקבלים Rewards ומתקדמים במסלול מובנה.<\u002Fp><p>כ-Product Level Designer הראשון שהוקדש לפיצ׳ר, תכננתי Stage Layouts ברמה גבוהה ותרגמתי כיוון של Economy ו-Product ל-Layouts ולחוויות Progression שניתן לבצע, תוך תיאום הפקת תוכן, מימוש, בדיקות ואיטרציה.<\u002Fp><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">CHALLENGE<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>Wildland introduced a fundamentally different gameplay pattern into Coin Master - shifting players from the familiar spin-driven core loop into a spatial exploration experience based on resource spending, obstacle clearing, progression, and Stage completion.<\u002Fp><p>The challenge was to make this new interaction model immediately understandable within a mature live game, while ensuring it complemented the wider product ecosystem rather than competing with it for player attention, time, or resources. At the same time, obstacle costs, resource distribution, rewards, player momentum, and a continuous LiveOps production schedule had to remain balanced - layout, Economy, pacing, and production constraints working together as one connected system.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>Wildland הכניס ל-Coin Master דפוס משחק שונה מהותית - מעבר מה-Core Loop המוכר שמבוסס על Spins לחוויית חקירה מרחבית שמבוססת על הוצאת משאבים, פינוי Obstacles, Progression והשלמת Stages.<\u002Fp><p>האתגר היה להפוך את מודל האינטראקציה החדש למובן מיד בתוך משחק Live בוגר, ובו בזמן לוודא שהוא משלים את האקוסיסטם הרחב של המוצר ולא מתחרה בו על תשומת לב, זמן או משאבים של השחקן. במקביל היה צורך לשמור באיזון על עלויות Obstacles, פיזור משאבים, Rewards, מומנטום השחקן ולוח הפקה רציף של LiveOps. ה-Layout, ה-Economy, ה-Pacing ואילוצי ההפקה היו צריכים לעבוד כמערכת מחוברת אחת.<\u002Fp><\u002Fsc-if><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">APPROACH<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><sc-if value=\"{{ isEn }}\" hint-placeholder-val=\"{{ true }}\"><p>I translated Product and Economy direction into playable Stage and Chapter layouts, progression configurations, content requirements, and production-ready solutions.<\u002Fp><\u002Fsc-if><sc-if value=\"{{ isHe }}\" hint-placeholder-val=\"{{ false }}\"><p>תרגמתי כיוון של Product ו-Economy ל-Stage ו-Chapter Layouts שניתן לבצע, תצורות Progression, דרישות תוכן ופתרונות שניתן לממש.<\u002Fp><\u002Fsc-if><ul class=\"ulist\"><li><span class=\"bul\">·<\u002Fspan>High-level Stage and Chapter layouts, route structure, and area sequencing.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Obstacle, resource, and reward placement tuned for progression pacing.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>When tests showed a mid-Stage bottleneck, I redistributed cost, obstacle density, and reward cadence with Economy - preserving the total cost envelope while improving momentum toward completion.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Chapter Dressing, art and asset requirements, and internal tooling needs.<\u002Fli><li><span class=\"bul\">·<\u002Fspan>Use cases and acceptance criteria, iteration, validation, and QA support.<\u002Fli><\u002Ful><div class=\"note\">// Scope: I translated direction into executable layouts, configurations, and content requirements. I did not own the full feature strategy, roadmap, KPI strategy, final business decisions, or the main Wildland PRD.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">SYSTEM<br>CONTEXT<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><svg viewBox=\"0 0 560 290\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:auto;display:block\"><defs><marker id=\"w03y\" markerWidth=\"7\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 7 3, 0 6\" fill=\"#FFC400\"><\u002Fpolygon><\u002Fmarker><marker id=\"w03d\" markerWidth=\"7\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 7 3, 0 6\" style=\"fill:var(--dim)\"><\u002Fpolygon><\u002Fmarker><\u002Fdefs><rect x=\"30\" y=\"42\" width=\"220\" height=\"206\" rx=\"8\" style=\"stroke:var(--dim);fill:var(--dim);fill-opacity:.04\" stroke-width=\"1\"><\u002Frect><rect x=\"310\" y=\"42\" width=\"220\" height=\"206\" rx=\"8\" style=\"stroke:var(--dim);fill:var(--dim);fill-opacity:.04\" stroke-width=\"1\"><\u002Frect><text x=\"140\" y=\"58\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.08em\">CORE GAME<\u002Ftext><text x=\"420\" y=\"58\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.08em\">WILDLAND<\u002Ftext><line x1=\"176\" y1=\"90\" x2=\"384\" y2=\"90\" stroke=\"#FFC400\" stroke-width=\"1.5\" marker-end=\"url(#w03y)\"><\u002Fline><text x=\"280\" y=\"82\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:9px;letter-spacing:.05em\">POTIONS<\u002Ftext><line x1=\"420\" y1=\"126\" x2=\"420\" y2=\"184\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" marker-end=\"url(#w03d)\"><\u002Fline><line x1=\"384\" y1=\"220\" x2=\"176\" y2=\"220\" stroke=\"#FFC400\" stroke-width=\"1.5\" marker-end=\"url(#w03y)\"><\u002Fline><text x=\"280\" y=\"240\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:9px;letter-spacing:.05em\">REWARDS<\u002Ftext><line x1=\"140\" y1=\"184\" x2=\"140\" y2=\"126\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" marker-end=\"url(#w03d)\"><\u002Fline><circle cx=\"140\" cy=\"90\" r=\"36\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><g transform=\"translate(128,78)\" style=\"stroke:var(--dim)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M11 15h2a2 2 0 1 0 0-4h-3c-.6 0-1.1.2-1.4.6L3 17\"><\u002Fpath><path d=\"m7 21 1.6-1.4c.3-.4.8-.6 1.4-.6h4c1.1 0 2.1-.4 2.8-1.2l4.6-4.4a2 2 0 0 0-2.75-2.91l-4.2 3.9\"><\u002Fpath><path d=\"m2 16 6 6\"><\u002Fpath><circle cx=\"16\" cy=\"9\" r=\"2.9\"><\u002Fcircle><circle cx=\"6\" cy=\"5\" r=\"3\"><\u002Fcircle><\u002Fg><text x=\"140\" y=\"142\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">EARN POTIONS<\u002Ftext><circle cx=\"420\" cy=\"90\" r=\"36\" stroke=\"#FFC400\" stroke-width=\"1.5\" fill=\"rgba(255,196,0,0.07)\"><\u002Fcircle><g transform=\"translate(408,78)\" stroke=\"#FFC400\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M14 2v6a2 2 0 0 0 .245.96l5.51 10.08A2 2 0 0 1 18 22H6a2 2 0 0 1-1.755-2.96l5.51-10.08A2 2 0 0 0 10 8V2\"><\u002Fpath><path d=\"M6.453 15h11.094\"><\u002Fpath><path d=\"M8.5 2h7\"><\u002Fpath><\u002Fg><text x=\"420\" y=\"142\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:9px;letter-spacing:.06em\">SPEND POTIONS<\u002Ftext><circle cx=\"420\" cy=\"220\" r=\"36\" style=\"stroke:var(--fg);stroke-opacity:.45\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><g transform=\"translate(408,208)\" style=\"stroke:var(--fg)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"m14 12-8.381 8.38a1 1 0 0 1-3.001-3L11 9\"><\u002Fpath><path d=\"M15 15.5a.5.5 0 0 0 .5.5A6.5 6.5 0 0 0 22 9.5a.5.5 0 0 0-.5-.5h-1.672a2 2 0 0 1-1.414-.586l-5.062-5.062a1.205 1.205 0 0 0-1.704 0L9.352 5.648a1.205 1.205 0 0 0 0 1.704l5.062 5.062A2 2 0 0 1 15 13.828z\"><\u002Fpath><\u002Fg><text x=\"420\" y=\"272\" text-anchor=\"middle\" style=\"fill:var(--fg);fill-opacity:.65;font-family:var(--font);font-size:9px;letter-spacing:.06em\">CLEAR OBSTACLES<\u002Ftext><circle cx=\"140\" cy=\"220\" r=\"36\" stroke=\"#FFC400\" stroke-width=\"1.5\" fill=\"rgba(255,196,0,0.07)\"><\u002Fcircle><g transform=\"translate(128,208)\" stroke=\"#FFC400\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M10 14.66v1.626a2 2 0 0 1-.976 1.696A5 5 0 0 0 7 21.978\"><\u002Fpath><path d=\"M14 14.66v1.626a2 2 0 0 0 .976 1.696A5 5 0 0 1 17 21.978\"><\u002Fpath><path d=\"M18 9h1.5a1 1 0 0 0 0-5H18\"><\u002Fpath><path d=\"M4 22h16\"><\u002Fpath><path d=\"M6 9a6 6 0 0 0 12 0V3a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1z\"><\u002Fpath><path d=\"M6 9H4.5a1 1 0 0 1 0-5H6\"><\u002Fpath><\u002Fg><text x=\"140\" y=\"272\" text-anchor=\"middle\" fill=\"#FFC400\" style=\"font-family:var(--font);font-size:9px;letter-spacing:.06em\">RECEIVE REWARDS<\u002Ftext><text x=\"280\" y=\"287\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">W-03 · CORE ↔ EVENT RESOURCE EXCHANGE<\u002Ftext><\u002Fsvg><\u002Fdiv><\u002Fdiv>\n<div class=\"csec\"><div><div class=\"klabel\">INVESTMENT<br>DECISION<\u002Fdiv><\u002Fdiv><div class=\"csBody\"><svg viewBox=\"0 0 660 168\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;height:auto;display:block;margin-bottom:4px\"><defs><marker id=\"w04a\" markerWidth=\"7\" markerHeight=\"6\" refX=\"6\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0, 7 3, 0 6\" style=\"fill:var(--dim)\"><\u002Fpolygon><\u002Fmarker><\u002Fdefs><path d=\"M578,72 Q610,72 610,140 Q610,154 330,154 Q50,154 50,140 Q50,72 82,72\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" stroke-dasharray=\"4,3\" marker-end=\"url(#w04a)\" fill=\"none\"><\u002Fpath><line x1=\"118\" y1=\"72\" x2=\"158\" y2=\"72\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" marker-end=\"url(#w04a)\"><\u002Fline><line x1=\"238\" y1=\"72\" x2=\"278\" y2=\"72\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" marker-end=\"url(#w04a)\"><\u002Fline><line x1=\"358\" y1=\"72\" x2=\"398\" y2=\"72\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" marker-end=\"url(#w04a)\"><\u002Fline><line x1=\"478\" y1=\"72\" x2=\"518\" y2=\"72\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" marker-end=\"url(#w04a)\"><\u002Fline><!-- N1 route: SEE TARGET --><circle cx=\"80\" cy=\"72\" r=\"34\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><g transform=\"translate(68,60)\" style=\"stroke:var(--dim)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><circle cx=\"6\" cy=\"19\" r=\"3\"><\u002Fcircle><path d=\"M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15\"><\u002Fpath><circle cx=\"18\" cy=\"5\" r=\"3\"><\u002Fcircle><\u002Fg><text x=\"80\" y=\"120\" text-anchor=\"middle\" style=\"fill:var(--dim);font-family:var(--font);font-size:9px;letter-spacing:.06em\">SEE TARGET<\u002Ftext><!-- N2 table-columns-split: COMPARE --><circle cx=\"200\" cy=\"72\" r=\"34\" style=\"stroke:var(--dim)\" stroke-width=\"1.5\" fill=\"none\"><\u002Fcircle><g transform=\"translate(188,60)\" style=\"stroke:var(--dim)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><path d=\"M14 14v2\"><\u002Fpath><path
